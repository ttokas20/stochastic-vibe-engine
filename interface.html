<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE VIBE ENGINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #080808;
  --panel:     #0f0f0f;
  --panel2:    #141414;
  --border:    #1e1e1e;
  --border2:   #2a2a2a;
  --amber:     #ffb300;
  --amber-dim: #7a5500;
  --green:     #00e676;
  --green-dim: #005c2e;
  --red:       #ff1744;
  --red-dim:   #5a0018;
  --blue:      #40c4ff;
  --blue-dim:  #004d6e;
  --text:      #e0e0e0;
  --text-dim:  #555;
  --groove:    #1a1a1a;
  --font-mono: 'Share Tech Mono', monospace;
  --font-disp: 'Orbitron', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
  overflow-x: hidden;
}

/* ── CRT scanline overlay ─────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.07) 2px,
    rgba(0,0,0,0.07) 4px
  );
  pointer-events: none;
  z-index: 999;
}

/* ── Header ───────────────────────────────────────────────── */
header {
  width: 100%;
  max-width: 760px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border2);
  padding-bottom: 16px;
  margin-bottom: 28px;
}

.logo {
  font-family: var(--font-disp);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.25em;
  color: var(--amber);
  text-transform: uppercase;
  line-height: 1.4;
}

.logo span {
  display: block;
  font-size: 20px;
  letter-spacing: 0.15em;
  color: var(--text);
}

.status-cluster {
  display: flex;
  gap: 10px;
  align-items: center;
}

.led {
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--text-dim);
  box-shadow: none;
  transition: background 0.1s, box-shadow 0.1s;
}

.led.active {
  background: var(--green);
  box-shadow: 0 0 8px var(--green), 0 0 20px rgba(0,230,118,0.3);
}

.led.amber {
  background: var(--amber);
  box-shadow: 0 0 8px var(--amber), 0 0 20px rgba(255,179,0,0.3);
}

/* ── Main grid ────────────────────────────────────────────── */
.engine {
  width: 100%;
  max-width: 760px;
  display: grid;
  gap: 12px;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: auto auto auto;
}

/* ── Panel card ───────────────────────────────────────────── */
.card {
  background: var(--panel);
  border: 1px solid var(--border2);
  border-radius: 3px;
  padding: 18px 20px;
  position: relative;
}

.card::before {
  content: attr(data-label);
  position: absolute;
  top: -1px; left: 16px;
  background: var(--panel);
  padding: 0 8px;
  font-size: 9px;
  letter-spacing: 0.2em;
  color: var(--text-dim);
  text-transform: uppercase;
  transform: translateY(-50%);
  border-left: 1px solid var(--border2);
  border-right: 1px solid var(--border2);
}

.card.full { grid-column: 1 / -1; }

/* ── Transport ────────────────────────────────────────────── */
.transport {
  display: flex;
  gap: 12px;
  align-items: center;
  justify-content: center;
  padding: 8px 0 4px;
}

.btn {
  font-family: var(--font-disp);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.15em;
  padding: 12px 28px;
  border: 1px solid;
  border-radius: 2px;
  cursor: pointer;
  background: transparent;
  transition: all 0.08s;
  text-transform: uppercase;
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: currentColor;
  opacity: 0;
  transition: opacity 0.08s;
}

.btn:active::after { opacity: 0.12; }

.btn-play {
  color: var(--green);
  border-color: var(--green-dim);
}

.btn-play:hover, .btn-play.active {
  border-color: var(--green);
  box-shadow: 0 0 12px rgba(0,230,118,0.25), inset 0 0 20px rgba(0,230,118,0.06);
}

.btn-stop {
  color: var(--red);
  border-color: var(--red-dim);
}

.btn-stop:hover, .btn-stop.active {
  border-color: var(--red);
  box-shadow: 0 0 12px rgba(255,23,68,0.25), inset 0 0 20px rgba(255,23,68,0.06);
}

.btn-panic {
  color: var(--amber);
  border-color: var(--amber-dim);
  padding: 12px 16px;
  font-size: 9px;
}

.btn-panic:hover {
  border-color: var(--amber);
  box-shadow: 0 0 12px rgba(255,179,0,0.25);
}

/* ── BPM ──────────────────────────────────────────────────── */
.bpm-display {
  font-family: var(--font-disp);
  font-size: 52px;
  font-weight: 900;
  color: var(--amber);
  text-align: center;
  letter-spacing: 0.04em;
  line-height: 1;
  margin: 8px 0 16px;
  text-shadow: 0 0 30px rgba(255,179,0,0.4);
  transition: text-shadow 0.15s;
}

.bpm-display.pulse {
  text-shadow: 0 0 50px rgba(255,179,0,0.8);
}

.bpm-unit {
  font-size: 12px;
  color: var(--text-dim);
  letter-spacing: 0.2em;
  text-align: center;
  margin-bottom: 14px;
}

/* ── Custom range slider ─────────────────────────────────── */
input[type="range"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 3px;
  background: var(--border2);
  outline: none;
  border-radius: 0;
  cursor: pointer;
}

input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px; height: 22px;
  background: var(--amber);
  border-radius: 1px;
  box-shadow: 0 0 8px rgba(255,179,0,0.5);
  transition: box-shadow 0.1s;
}

input[type="range"]:hover::-webkit-slider-thumb {
  box-shadow: 0 0 16px rgba(255,179,0,0.8);
}

.bpm-ticks {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}

/* ── Selector buttons ────────────────────────────────────── */
.selector {
  display: grid;
  gap: 8px;
}

.selector.cols-2 { grid-template-columns: 1fr 1fr; }
.selector.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

.sel-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: 0.12em;
  padding: 11px 8px;
  border: 1px solid var(--border2);
  background: var(--panel2);
  color: var(--text-dim);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.1s;
  text-transform: uppercase;
  text-align: center;
  position: relative;
}

.sel-btn:hover {
  border-color: var(--border);
  color: var(--text);
}

.sel-btn.active-artist {
  border-color: var(--blue);
  color: var(--blue);
  background: rgba(64,196,255,0.06);
  box-shadow: 0 0 10px rgba(64,196,255,0.15);
}

.sel-btn.active-section {
  border-color: var(--green);
  color: var(--green);
  background: rgba(0,230,118,0.06);
  box-shadow: 0 0 10px rgba(0,230,118,0.15);
}

.sel-btn .sub {
  display: block;
  font-size: 8px;
  color: inherit;
  opacity: 0.6;
  margin-top: 3px;
  letter-spacing: 0.08em;
}

/* ── Step sequencer visualizer ───────────────────────────── */
.sequencer {
  display: grid;
  grid-template-columns: repeat(16, 1fr);
  gap: 4px;
  margin-top: 4px;
}

.seq-step {
  height: 28px;
  border-radius: 2px;
  background: var(--panel2);
  border: 1px solid var(--border);
  transition: background 0.05s, box-shadow 0.05s;
  position: relative;
}

.seq-step.beat { border-color: var(--border2); }

.seq-step.active-kick {
  background: var(--amber);
  box-shadow: 0 0 8px rgba(255,179,0,0.6);
}

.seq-step.active-snare {
  background: var(--blue);
  box-shadow: 0 0 8px rgba(64,196,255,0.6);
}

.seq-step.active-hat {
  background: var(--green);
  box-shadow: 0 0 6px rgba(0,230,118,0.5);
}

.seq-step.cursor {
  outline: 1px solid rgba(255,255,255,0.3);
  outline-offset: 1px;
}

.seq-labels {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  padding: 0 1px;
}

.seq-label {
  font-size: 8px;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}

/* ── Markov state display ────────────────────────────────── */
.markov-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 10px;
}

.markov-state {
  font-family: var(--font-disp);
  font-size: 9px;
  color: var(--text-dim);
  padding: 4px 8px;
  border: 1px solid var(--border);
  border-radius: 2px;
  transition: all 0.1s;
}

.markov-state.current {
  color: var(--green);
  border-color: var(--green);
  background: rgba(0,230,118,0.08);
  box-shadow: 0 0 8px rgba(0,230,118,0.2);
}

.markov-label {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-right: 4px;
}

/* ── Energy meter ────────────────────────────────────────── */
.energy-bar-wrap {
  margin-top: 12px;
  display: flex;
  gap: 8px;
  align-items: center;
}

.energy-label {
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
  width: 52px;
  text-transform: uppercase;
}

.energy-track {
  flex: 1;
  height: 4px;
  background: var(--panel2);
  border-radius: 0;
  overflow: hidden;
}

.energy-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--green), var(--amber));
  transition: width 0.3s ease;
  width: 20%;
}

/* ── Footer info strip ───────────────────────────────────── */
.infostrip {
  grid-column: 1 / -1;
  display: flex;
  gap: 24px;
  padding: 10px 20px;
  background: var(--panel2);
  border: 1px solid var(--border);
  border-radius: 2px;
  font-size: 9px;
  color: var(--text-dim);
  letter-spacing: 0.12em;
}

.infostrip span b {
  color: var(--amber);
  font-weight: normal;
}

/* ── Flicker animation ───────────────────────────────────── */
@keyframes flicker {
  0%,100% { opacity: 1; }
  92%      { opacity: 1; }
  93%      { opacity: 0.6; }
  94%      { opacity: 1; }
  97%      { opacity: 0.8; }
  98%      { opacity: 1; }
}

.logo { animation: flicker 8s infinite; }

/* ── Beat pulse animation ────────────────────────────────── */
@keyframes beatPulse {
  0%   { transform: scale(1); }
  10%  { transform: scale(1.04); }
  30%  { transform: scale(1); }
}

.beat-flash {
  animation: beatPulse 0.18s ease-out;
}
</style>
</head>
<body>

<!-- ── HEADER ─────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    Vibe Engine
    <span>LIVE ▸ TRAP</span>
  </div>
  <div class="status-cluster">
    <div class="led" id="ledConnection" title="TCP Connection"></div>
    <div class="led" id="ledPlaying"    title="Engine Running"></div>
    <div class="led amber" id="ledBeat" title="Beat Clock"></div>
  </div>
</header>

<!-- ── MAIN GRID ──────────────────────────────────────────────── -->
<div class="engine">

  <!-- TRANSPORT -->
  <div class="card full" data-label="Transport">
    <div class="transport">
      <button class="btn btn-play" id="btnPlay"  onclick="cmdPlay()">▶ Play</button>
      <button class="btn btn-stop" id="btnStop"  onclick="cmdStop()">■ Stop</button>
      <button class="btn btn-panic"              onclick="cmdPanic()">⚡ All Off</button>
    </div>
  </div>

  <!-- BPM -->
  <div class="card" data-label="Tempo">
    <div class="bpm-display" id="bpmDisplay">140</div>
    <div class="bpm-unit">BPM</div>
    <input type="range" id="bpmSlider" min="80" max="180" value="140"
           oninput="updateBPM(this.value)">
    <div class="bpm-ticks">
      <span>80</span><span>100</span><span>120</span><span>140</span><span>160</span><span>180</span>
    </div>
  </div>

  <!-- ARTIST -->
  <div class="card" data-label="Artist DNA">
    <div class="selector cols-2" id="artistSelector">
      <button class="sel-btn active-artist" data-artist="travis" onclick="setArtist('travis',this)">
        Travis Scott
        <span class="sub">Dark · Swung</span>
      </button>
      <button class="sel-btn" data-artist="don" onclick="setArtist('don',this)">
        Don Toliver
        <span class="sub">Smooth · Straight</span>
      </button>
    </div>

    <div class="markov-row">
      <span class="markov-label">HAT STATE</span>
      <div class="markov-state" id="mX">X</div>
      <div class="markov-state" id="mx">x</div>
      <div class="markov-state" id="mr">r</div>
      <div class="markov-state" id="mR">R</div>
      <div class="markov-state current" id="m_">–</div>
    </div>
  </div>

  <!-- SECTION -->
  <div class="card full" data-label="Section">
    <div class="selector cols-4" id="sectionSelector">
      <button class="sel-btn active-section" data-section="intro" onclick="setSection('intro',this)">
        Intro
        <span class="sub">Minimal</span>
      </button>
      <button class="sel-btn" data-section="verse" onclick="setSection('verse',this)">
        Verse
        <span class="sub">Groove</span>
      </button>
      <button class="sel-btn" data-section="drop" onclick="setSection('drop',this)">
        Drop
        <span class="sub">Chaotic</span>
      </button>
      <button class="sel-btn" data-section="chorus" onclick="setSection('chorus',this)">
        Chorus
        <span class="sub">Energy</span>
      </button>
    </div>

    <div class="energy-bar-wrap" style="margin-top:14px;">
      <span class="energy-label">Density</span>
      <div class="energy-track">
        <div class="energy-fill" id="energyFill"></div>
      </div>
    </div>
  </div>

  <!-- STEP VISUALIZER -->
  <div class="card full" data-label="Step Visualizer · 16 steps">
    <div class="sequencer" id="sequencer"></div>
    <div class="seq-labels">
      <span class="seq-label">1</span>
      <span class="seq-label">2</span>
      <span class="seq-label">3</span>
      <span class="seq-label">4</span>
    </div>

    <div style="margin-top:14px; display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;">
      <div class="energy-bar-wrap" style="margin-top:0">
        <span class="energy-label" style="color:var(--amber)">Kick</span>
        <div class="energy-track"><div class="energy-fill" id="barKick" style="background:var(--amber);"></div></div>
      </div>
      <div class="energy-bar-wrap" style="margin-top:0">
        <span class="energy-label" style="color:var(--blue)">Snare</span>
        <div class="energy-track"><div class="energy-fill" id="barSnare" style="background:var(--blue);"></div></div>
      </div>
      <div class="energy-bar-wrap" style="margin-top:0">
        <span class="energy-label" style="color:var(--green)">Hat</span>
        <div class="energy-track"><div class="energy-fill" id="barHat" style="background:var(--green);"></div></div>
      </div>
    </div>
  </div>

  <!-- INFO STRIP -->
  <div class="infostrip">
    <span>HOST <b>localhost:8001</b></span>
    <span>TCP MIDI <b>:8000</b></span>
    <span>VERSION <b>2.0</b></span>
    <span id="infoStatus">STATUS <b>OFFLINE</b></span>
    <span id="infoStep">STEP <b>--</b></span>
  </div>

</div>


<script>
// ─── State ──────────────────────────────────────────────────────
let playing   = false;
let bpm       = 140;
let artist    = "travis";
let section   = "intro";
let stepClock = 0;
let beatTimer = null;
let simStep   = 0;
let hatState  = "-";

// ─── Section energy map (mirrors brains.py) ─────────────────────
const SECTION_DENSITY = { intro:0.20, verse:0.50, drop:0.90, chorus:0.70 };

const KICK_POS = {
  travis: {0:1,2:.4,3:.25,4:.3,6:.55,8:.2,10:.6,11:.3,12:.35,14:.45,15:.25},
  don:    {0:1,4:.5,6:.2,8:.15,10:.3,12:.5,14:.2},
};

const HAT_TRANS = {
  travis: {X:{X:.1,x:.4,r:.25,R:.1,"-":.15}, x:{X:.2,x:.3,r:.3,R:.05,"-":.15},
           r:{X:.1,x:.35,r:.35,R:.05,"-":.15}, R:{X:.15,x:.35,r:.2,R:.05,"-":.25},
           "-":{X:.25,x:.3,r:.2,R:.05,"-":.2}},
  don:    {X:{X:.05,x:.5,r:.15,R:.05,"-":.25}, x:{X:.1,x:.45,r:.2,R:.03,"-":.22},
           r:{X:.08,x:.4,r:.3,R:.02,"-":.2}, R:{X:.1,x:.4,r:.15,R:.05,"-":.3},
           "-":{X:.15,x:.45,r:.15,R:.02,"-":.23}},
};

// ─── Send command to brains.py ───────────────────────────────────
async function sendCmd(command) {
  try {
    const r = await fetch("http://localhost:8001", {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: command
    });
    setOnline(r.ok);
  } catch {
    setOnline(false);
  }
}

function setOnline(ok) {
  document.getElementById("infoStatus").innerHTML =
    `STATUS <b style="color:${ok?'var(--green)':'var(--red)'};">${ok?'ONLINE':'OFFLINE'}</b>`;
  document.getElementById("ledConnection").className = "led" + (ok ? " active" : "");
}

// ─── Controls ────────────────────────────────────────────────────
function cmdPlay() {
  playing = true;
  sendCmd("PLAY");
  document.getElementById("btnPlay").classList.add("active");
  document.getElementById("btnStop").classList.remove("active");
  document.getElementById("ledPlaying").classList.add("active");
  startSim();
}

function cmdStop() {
  playing = false;
  sendCmd("STOP");
  document.getElementById("btnStop").classList.add("active");
  document.getElementById("btnPlay").classList.remove("active");
  document.getElementById("ledPlaying").classList.remove("active");
  stopSim();
}

function cmdPanic() {
  sendCmd("ALL_OFF|0");
}

function updateBPM(val) {
  bpm = parseInt(val);
  document.getElementById("bpmDisplay").textContent = val;
  sendCmd("BPM:" + val);
  if (playing) { stopSim(); startSim(); }
}

function setArtist(a, el) {
  artist = a;
  hatState = "-";  // reset local Markov sim
  sendCmd("ARTIST:" + a);
  document.querySelectorAll("[data-artist]").forEach(b => b.classList.remove("active-artist"));
  el.classList.add("active-artist");
}

function setSection(s, el) {
  section = s;
  sendCmd("SECTION:" + s);
  document.querySelectorAll("[data-section]").forEach(b => b.classList.remove("active-section"));
  el.classList.add("active-section");
  document.getElementById("energyFill").style.width =
    (SECTION_DENSITY[s] * 100) + "%";
}

// ─── Step visualizer simulation ──────────────────────────────────
function buildSequencer() {
  const seq = document.getElementById("sequencer");
  seq.innerHTML = "";
  for (let i = 0; i < 16; i++) {
    const d = document.createElement("div");
    d.className = "seq-step" + (i % 4 === 0 ? " beat" : "");
    d.id = "step_" + i;
    seq.appendChild(d);
  }
}

function markovNext(state, trans) {
  const row  = trans[state];
  let   roll = Math.random(), cum = 0;
  for (const [s, p] of Object.entries(row)) {
    cum += p;
    if (roll < cum) return s;
  }
  return "-";
}

function kickP(step) {
  const density = SECTION_DENSITY[section];
  const weights = KICK_POS[artist];
  const base    = weights[step] ?? 0.05;
  return Math.min(base * density, 0.98);
}

function simTick() {
  const s = simStep;

  // clear previous cursor
  document.querySelectorAll(".seq-step").forEach(el => {
    el.classList.remove("cursor", "active-kick", "active-snare", "active-hat");
  });

  const el = document.getElementById("step_" + s);
  if (!el) return;
  el.classList.add("cursor");

  // Kick
  const kicked = Math.random() < kickP(s);
  if (kicked) el.classList.add("active-kick");

  // Snare
  const snareSteps = section === "drop" ? [4,8,12] : [4,12];
  if (snareSteps.includes(s)) el.classList.add("active-snare");

  // Hat (Markov — local sim)
  const hatActive = section !== "intro" || s % 8 === 0;
  if (hatActive) {
    hatState = markovNext(hatState, HAT_TRANS[artist]);
    if (hatState !== "-") el.classList.add("active-hat");
    updateMarkovDisplay(hatState);
  }

  // Beat LED
  if (s % 4 === 0) {
    const led = document.getElementById("ledBeat");
    led.classList.add("active");
    setTimeout(() => led.classList.remove("active"), 80);
    // BPM flash
    const bpmEl = document.getElementById("bpmDisplay");
    bpmEl.classList.add("beat-flash");
    setTimeout(() => bpmEl.classList.remove("beat-flash"), 180);
  }

  // Velocity bars (simulated)
  document.getElementById("barKick").style.width  = kicked ? (70 + Math.random()*30) + "%" : "10%";
  document.getElementById("barSnare").style.width = snareSteps.includes(s) ? (80+Math.random()*20)+"%" : "5%";
  document.getElementById("barHat").style.width   = hatState !== "-" ? (40+Math.random()*55)+"%" : "5%";

  document.getElementById("infoStep").innerHTML = `STEP <b>${s+1}</b>`;
  simStep = (s + 1) % 16;
}

function updateMarkovDisplay(state) {
  ["X","x","r","R","-"].forEach(st => {
    const id  = "m" + (st === "-" ? "_" : st);
    const el  = document.getElementById(id);
    if (el) el.className = "markov-state" + (st === state ? " current" : "");
  });
}

let simInterval = null;

function startSim() {
  stopSim();
  const ms = (60000 / bpm) / 4;
  simInterval = setInterval(simTick, ms);
}

function stopSim() {
  if (simInterval) { clearInterval(simInterval); simInterval = null; }
  simStep = 0;
  document.querySelectorAll(".seq-step").forEach(el =>
    el.classList.remove("cursor","active-kick","active-snare","active-hat")
  );
  document.getElementById("infoStep").innerHTML = "STEP <b>--</b>";
  document.getElementById("barKick").style.width  = "5%";
  document.getElementById("barSnare").style.width = "5%";
  document.getElementById("barHat").style.width   = "5%";
}

// ─── Init ─────────────────────────────────────────────────────────
buildSequencer();
document.getElementById("energyFill").style.width =
  (SECTION_DENSITY[section] * 100) + "%";
setOnline(false);
</script>
</body>
</html>
