<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE CONTROLS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #050505;
  --panel:     #0a0a0a;
  --panel2:    #111;
  --border:    #222;
  --border2:   #333;
  --amber:     #ff008e;
  --green:     #ff008e;
  --red:       #ff1744;
  --purple:    #b388ff;
  --blue:      #ff008e;
  --text:      #e0e0e0;
  --text-dim:  #555;
  --font-mono: 'Share Tech Mono', monospace;
  --font-disp: 'Orbitron', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 24px 16px 48px;
}

body::after {
  content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px); pointer-events: none; z-index: 999;
}

header { width: 100%; max-width: 760px; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border2); padding-bottom: 16px; margin-bottom: 28px; }
.logo { font-family: var(--font-disp); font-size: 11px; font-weight: 700; letter-spacing: 0.25em; color: var(--purple); text-transform: uppercase; }
.logo span { display: block; font-size: 20px; letter-spacing: 0.15em; color: var(--text); }
.status-cluster { display: flex; gap: 10px; align-items: center; }
.led { width: 9px; height: 9px; border-radius: 50%; background: var(--text-dim); transition: 0.1s; }
.led.active { background: var(--green); box-shadow: 0 0 8px var(--green); }

.engine { width: 100%; max-width: 760px; display: grid; gap: 12px; grid-template-columns: 1fr 1fr; }
.card { background: var(--panel); border: 1px solid var(--border2); padding: 18px 20px; position: relative; }
.card::before { content: attr(data-label); position: absolute; top: -1px; left: 16px; background: var(--panel); padding: 0 8px; font-size: 9px; letter-spacing: 0.2em; color: var(--text-dim); transform: translateY(-50%); border-left: 1px solid var(--border2); border-right: 1px solid var(--border2); }
.card.full { grid-column: 1 / -1; }

.btn { font-family: var(--font-disp); font-size: 11px; font-weight: 700; padding: 12px 28px; border: 1px solid; cursor: pointer; background: transparent; text-transform: uppercase; transition: 0.1s; }
.btn-play { color: var(--green); border-color: var(--green); }
.btn-play.active { box-shadow: 0 0 12px var(--green); background: rgba(255,0,142,0.1); }
.btn-stop { color: var(--red); border-color: var(--red); }
.btn-stop.active { box-shadow: 0 0 12px rgba(255,23,68,0.25); background: rgba(255,23,68,0.1); }

.selector { display: grid; gap: 8px; grid-template-columns: 1fr 1fr; }
.sel-btn { font-family: var(--font-mono); font-size: 11px; padding: 11px 8px; border: 1px solid var(--border2); background: var(--panel2); color: var(--text-dim); cursor: pointer; text-transform: uppercase; transition: 0.1s; }
.sel-btn.active-artist { border-color: var(--purple); color: var(--purple); background: rgba(179,136,255,0.1); }
.sel-btn.active-section { border-color: var(--amber); color: var(--amber); background: rgba(255,0,142,0.1); }

/* MIXER TOGGLES */
.mixer-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; }
.mute-btn { padding: 16px 0; border: 1px solid var(--green); background: rgba(255,0,142,0.1); color: var(--green); cursor: pointer; font-family: var(--font-disp); font-size: 10px; font-weight: bold; text-align: center; transition: 0.2s; }
.mute-btn.muted { border-color: var(--border2); background: var(--panel); color: var(--text-dim); }
.mute-btn:hover { filter: brightness(1.5); }

.sequencer { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; margin-top: 12px; }
.seq-step { height: 28px; background: var(--panel2); border: 1px solid var(--border); transition: 0.05s; }
.seq-step.beat { border-color: var(--border2); }
.seq-step.cursor { background: var(--amber); outline: 1px solid var(--amber); box-shadow: 0 0 10px var(--amber); }

.infostrip { grid-column: 1 / -1; display: flex; justify-content: space-between; padding: 10px 20px; background: var(--panel2); border: 1px solid var(--border); font-size: 9px; color: var(--text-dim); }
</style>
</head>
<body>

<header>
  <div class="logo">Vibe Engine<span>PERFORMANCE MIXER</span></div>
  <div class="status-cluster">
    <div class="led" id="ledConnection"></div>
    <div class="led" id="ledPlaying"></div>
  </div>
</header>

<div class="engine">

  <div class="card full" data-label="Transport" style="display: flex; justify-content: center; gap: 12px;">
    <button class="btn btn-play" id="btnPlay" onclick="cmdPlay()">▶ Play</button>
    <button class="btn btn-stop active" id="btnStop" onclick="cmdStop()">■ Stop</button>
  </div>

  <div class="card" data-label="DNA / BPM">
    <div class="selector" style="margin-bottom: 16px;">
      <button class="sel-btn active-artist" onclick="setArtist('travis',this)">Travis</button>
      <button class="sel-btn" onclick="setArtist('don',this)">Don</button>
    </div>
    <div style="font-family: var(--font-disp); font-size: 32px; color: var(--amber); text-align: center;" id="bpmDisplay">130</div>
    <input type="range" style="width: 100%; accent-color: var(--amber);" min="100" max="160" value="130" oninput="updateBPM(this.value)">
  </div>

  <div class="card" data-label="Arrangement">
    <div class="selector" style="grid-template-columns: 1fr 1fr; height: 100%;">
      <button class="sel-btn active-section" onclick="setSection('intro',this)">Intro</button>
      <button class="sel-btn" onclick="setSection('verse',this)">Verse</button>
      <button class="sel-btn" onclick="setSection('drop',this)">Drop</button>
      <button class="sel-btn" onclick="setSection('chorus',this)">Chorus</button>
    </div>
  </div>

  <div class="card full" data-label=" Mixer / Mutes">
    <div class="mixer-grid">
      <div class="mute-btn" onclick="toggleMute('kick', this)">KICK</div>
      <div class="mute-btn" onclick="toggleMute('snare', this)">SNARE</div>
      <div class="mute-btn" onclick="toggleMute('hat', this)">HATS</div>
      <div class="mute-btn" onclick="toggleMute('bass', this)">808</div>
      <div class="mute-btn" onclick="toggleMute('chords', this)">CHORDS</div>
      <div class="mute-btn" onclick="toggleMute('atmos', this)">ATMOS</div>
    </div>
  </div>

  <div class="card full" data-label="Master Clock">
    <div class="sequencer" id="sequencer"></div>
  </div>

  <div class="infostrip">
    <span id="infoStatus">SERVER: <b style="color:var(--red)">OFFLINE</b></span>
    <span id="infoStep">BAR <b>0</b> | STEP <b>0</b></span>
  </div>

</div>

<script>
let playing = false, bpm = 130;
let globalStep = 0, simInterval = null;

// Network
async function sendCmd(cmd) {
  try {
    const r = await fetch("http://localhost:8001", { method: "POST", body: cmd });
    const ok = r.ok;
    document.getElementById("infoStatus").innerHTML = `SERVER: <b style="color:${ok?'var(--green)':'var(--red)'};">${ok?'ONLINE':'OFFLINE'}</b>`;
    document.getElementById("ledConnection").classList.toggle("active", ok);
  } catch {
    document.getElementById("infoStatus").innerHTML = `SERVER: <b style="color:var(--red)">OFFLINE</b>`;
    document.getElementById("ledConnection").classList.remove("active");
  }
}

// UI Actions
function cmdPlay() { playing = true; sendCmd("PLAY"); document.getElementById("btnPlay").classList.add("active"); document.getElementById("btnStop").classList.remove("active"); startSim(); }
function cmdStop() { playing = false; sendCmd("STOP"); document.getElementById("btnStop").classList.add("active"); document.getElementById("btnPlay").classList.remove("active"); stopSim(); }
function updateBPM(v) { bpm = v; document.getElementById("bpmDisplay").innerText = v; sendCmd("BPM:"+v); if(playing){stopSim();startSim();} }
function setArtist(a, el) { sendCmd("ARTIST:"+a); document.querySelectorAll('.active-artist').forEach(e=>e.classList.remove('active-artist')); el.classList.add('active-artist'); }
function setSection(s, el) { sendCmd("SECTION:"+s); document.querySelectorAll('.active-section').forEach(e=>e.classList.remove('active-section')); el.classList.add('active-section'); }

// Toggle Mutes
function toggleMute(inst, el) {
  sendCmd("TOGGLE:" + inst);
  el.classList.toggle("muted");
}

// Sequencer Builder
const seq = document.getElementById("sequencer");
for(let i=0; i<16; i++) {
  const d = document.createElement("div");
  d.className = "seq-step" + (i%4===0?" beat":"");
  d.id = "step_" + i;
  seq.appendChild(d);
}

function simTick() {
  const localStep = globalStep % 16;
  const bar = Math.floor(globalStep / 16) % 4 + 1;
  
  document.querySelectorAll(".seq-step").forEach(el => el.className = "seq-step" + (el.id.split("_")[1]%4===0?" beat":""));
  document.getElementById("step_" + localStep).classList.add("cursor");
  document.getElementById("infoStep").innerHTML = `BAR <b>${bar}</b> | STEP <b>${localStep+1}</b>`;
  
  globalStep++;
}

function startSim() { stopSim(); simInterval = setInterval(simTick, (60000/bpm)/4); document.getElementById("ledPlaying").classList.add("active"); }
function stopSim() { clearInterval(simInterval); globalStep = 0; document.getElementById("ledPlaying").classList.remove("active"); document.querySelectorAll(".seq-step").forEach(el => el.className = "seq-step" + (el.id.split("_")[1]%4===0?" beat":"")); }
</script>
</body>
</html>
